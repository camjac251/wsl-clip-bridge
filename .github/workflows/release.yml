name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (leave empty for auto-release)"
        required: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: xclip

jobs:
  release-plz-pr:
    name: Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: Release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tag == '')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: extract
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES" | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.arch }}
    needs: release
    if: >-
      always() &&
      (needs.release.outputs.releases_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            arch: linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || inputs.tag }}

      - name: Build with cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Package binary and tarball
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          # Bare binary with arch suffix
          cp "$SRC" "${{ env.BINARY_NAME }}-${{ matrix.arch }}"
          # Tarball with scripts, config, and README
          mkdir -p wsl-clip-bridge
          cp "$SRC" wsl-clip-bridge/
          cp -r scripts config README.md wsl-clip-bridge/
          tar czf "wsl-clip-bridge-${{ matrix.arch }}.tar.gz" wsl-clip-bridge

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.arch }}
            wsl-clip-bridge-${{ matrix.arch }}.tar.gz

  upload:
    name: Upload Binaries
    needs: [release, build]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.release.outputs.releases_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'artifacts/*'

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag || inputs.tag }}
        run: gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber

  update-homebrew:
    name: Update Homebrew Tap
    needs: [release, build, upload]
    if: needs.upload.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate token for homebrew-tap
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: camjac251
          repositories: homebrew-tap

      - uses: actions/checkout@v6
        with:
          repository: camjac251/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap
          ref: main

      - name: Update formula
        env:
          TAG: ${{ needs.release.outputs.tag || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          SHA1=$(sha256sum artifacts/xclip-linux-arm64 | cut -d' ' -f1)
          SHA2=$(sha256sum artifacts/xclip-linux-x86_64 | cut -d' ' -f1)

          homebrew-tap/scripts/update-formula.sh \
            homebrew-tap/Formula/wsl-clip-bridge.rb \
            "$VERSION" "$SHA1" "$SHA2"

          cd homebrew-tap
          git config user.name "brew-bottler[bot]"
          git config user.email "brew-bottler[bot]@users.noreply.github.com"
          git add Formula/wsl-clip-bridge.rb
          git diff --cached --quiet || { git commit -m "wsl-clip-bridge $VERSION" && git push; }
