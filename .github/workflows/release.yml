name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload binaries for (e.g. v1.0.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: xclip

jobs:
  release-plz-pr:
    name: Release PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: extract
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          TAG=$(echo "$RELEASES" | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build - ${{ matrix.arch }}
    needs: release
    if: >-
      always() &&
      ((github.event_name == 'push' && needs.release.outputs.releases_created == 'true') ||
      github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            arch: linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag || inputs.tag }}

      - name: Build with cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Package binary and tarball
        run: |
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          # Bare binary with arch suffix
          cp "$SRC" "${{ env.BINARY_NAME }}-${{ matrix.arch }}"
          # Tarball with scripts, config, and README
          mkdir -p wsl-clip-bridge
          cp "$SRC" wsl-clip-bridge/
          cp -r scripts config README.md wsl-clip-bridge/
          tar czf "wsl-clip-bridge-${{ matrix.arch }}.tar.gz" wsl-clip-bridge

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.arch }}
            wsl-clip-bridge-${{ matrix.arch }}.tar.gz

  upload:
    name: Upload Binaries
    needs: [release, build]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      ((github.event_name == 'push' && needs.release.outputs.releases_created == 'true') ||
      github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/*'

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag || inputs.tag }}
        run: gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
